<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Bella!</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
  
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN to compile JSX inside the browser on the fly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-serif-italic {
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    /* Custom animations */
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    .animate-pulse-slow {
      animation: pulse-slow 8s infinite ease-in-out;
    }
    /* Hide scrollbars but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-amber-50/40 text-slate-800 transition-colors duration-1000">

  <div id="root"></div>

  <!-- React Application Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Default template customized specifically for BELLA
    const DEFAULT_SLIDES = [
      {
        id: 'birth',
        year: '2016',
        title: 'Welcome to the World, Bella!',
        ageLabel: 'Born',
        description: 'The day you arrived and changed our lives forever. A tiny miracle that brought endless light, warmth, and joy into our family.',
        image: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=800&q=80' // Mountain sunrise fallback. Swap with her baby photo!
      },
      {
        id: 'year1',
        year: '2017',
        title: 'First Steps & Brightest Smiles',
        ageLabel: 'Age 1',
        description: 'Taking your very first steps, exploring every corner of the world with wide-eyed curiosity and the sweetest baby laughter.',
        image: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80'
      },
      {
        id: 'year3',
        year: '2019',
        title: 'Endless Imagination',
        ageLabel: 'Age 3',
        description: 'Creating imaginary castles, singing made-up songs, and reminding us all how magical the world is through your sparkling eyes.',
        image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80'
      },
      {
        id: 'year6',
        year: '2022',
        title: 'Off to Kindergarten',
        ageLabel: 'Age 6',
        description: 'Bag packed, big brave smile, and ready to conquer big school! Making friends and learning so fast we could barely keep up.',
        image: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=800&q=80'
      },
      {
        id: 'year9',
        year: '2025',
        title: 'A Beautiful, Loving Soul',
        ageLabel: 'Age 9',
        description: 'Watching you grow into such a caring, creative, and talented young lady. You make everyone around you so incredibly proud.',
        image: 'https://images.unsplash.com/photo-1500627869374-13cd993b1115?auto=format&fit=crop&w=800&q=80'
      },
      {
        id: 'year10',
        year: '2026',
        title: 'Happy 10th Birthday, Bella!',
        ageLabel: 'Age 10',
        description: 'Double digits! Today we celebrate the amazing person you are and all the incredible adventures waiting for you this year.',
        image: 'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?auto=format&fit=crop&w=800&q=80'
      }
    ];

    // SVG icons directly inside JSX so they always render perfectly without broken dependencies
    const SparklesIcon = () => (
      <svg className="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
      </svg>
    );

    const HeartIcon = ({ className }) => (
      <svg className={className || "w-6 h-6 text-rose-500"} fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
      </svg>
    );

    const TicketIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
      </svg>
    );

    const CalendarIcon = () => (
      <svg className="w-4 h-4 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );

    const MapPinIcon = () => (
      <svg className="w-4 h-4 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    );

    function App() {
      // --- STATE ---
      const [nieceName, setNieceName] = useState(() => localStorage.getItem('bd_niece_name_b') || 'Bella');
      const [birthYear, setBirthYear] = useState(() => Number(localStorage.getItem('bd_birth_year_b')) || 2016);
      const [slides, setSlides] = useState(() => {
        const saved = localStorage.getItem('bd_slides_b');
        return saved ? JSON.parse(saved) : DEFAULT_SLIDES;
      });
      
      const [ticket, setTicket] = useState(() => {
        const saved = localStorage.getItem('bd_ticket_b');
        return saved ? JSON.parse(saved) : {
          artist: 'RÜFÜS DU SOL',
          tour: 'Inhale / Exhale World Tour 2026',
          date: 'Saturday, August 15, 2026',
          venue: 'The Riverstage, Brisbane',
          section: 'VIP Front Lawn',
          row: 'GA1',
          seat: 'Bella\'s Custom Access',
          notes: 'Includes pre-show soundcheck & backstage viewing access!'
        };
      });

      const [currentSlide, setCurrentSlide] = useState(0);
      const [mode, setMode] = useState('preview'); // 'preview' or 'edit'
      const [revealStarted, setRevealStarted] = useState(false);
      const [revealStage, setRevealStage] = useState(0); // 0: atmospheric transition, 1: text pulse, 2: audio visualizer, 3: ticket reveal
      const [isPlaying, setIsPlaying] = useState(false);
      const [isMuted, setIsMuted] = useState(false);
      const [showToast, setShowToast] = useState(null);
      const [copiedLink, setCopiedLink] = useState(false);

      const canvasRef = useRef(null);
      const ytPlayerRef = useRef(null);

      // Save user edits automatically
      useEffect(() => {
        localStorage.setItem('bd_niece_name_b', nieceName);
        localStorage.setItem('bd_birth_year_b', birthYear.toString());
        localStorage.setItem('bd_slides_b', JSON.stringify(slides));
        localStorage.setItem('bd_ticket_b', JSON.stringify(ticket));
      }, [nieceName, birthYear, slides, ticket]);

      const triggerToast = (message) => {
        setShowToast(message);
        setTimeout(() => setShowToast(null), 3000);
      };

      // --- CANVAS STARFIELD & VISUALIZER ANIMATION ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        let width = (canvas.width = window.innerWidth);
        let height = (canvas.height = window.innerHeight);

        const handleResize = () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', handleResize);

        const stars = [];
        const numStars = 140;
        for (let i = 0; i < numStars; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.4 + 0.1,
            color: `rgba(${170 + Math.random() * 85}, ${190 + Math.random() * 65}, 255, ${Math.random() * 0.7 + 0.3})`
          });
        }

        let visualizerBars = [];
        const numBars = 35;
        for (let i = 0; i < numBars; i++) {
          visualizerBars.push({
            targetHeight: 5,
            currentHeight: 5,
            speed: 0.12 + Math.random() * 0.08
          });
        }

        const render = () => {
          if (revealStarted) {
            ctx.fillStyle = 'rgba(6, 5, 14, 0.25)'; // Deep dark-purple cosmos
            ctx.fillRect(0, 0, width, height);

            // Center radial background glow (Rüfüs atmospheric theme)
            const gradient = ctx.createRadialGradient(
              width / 2, height / 2, 50,
              width / 2, height / 2, Math.max(width, height) * 0.7
            );
            gradient.addColorStop(0, 'rgba(56, 189, 248, 0.07)');  // Cyan
            gradient.addColorStop(0.5, 'rgba(139, 92, 246, 0.04)'); // Violet
            gradient.addColorStop(1, 'rgba(5, 4, 10, 0.98)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Update & draw cosmic stars
            stars.forEach(star => {
              star.y += isPlaying ? star.speed * 4 : star.speed;
              if (star.y > height) {
                star.y = 0;
                star.x = Math.random() * width;
              }
              ctx.beginPath();
              ctx.arc(star.x, star.y, star.size * (isPlaying ? 1.6 : 1), 0, Math.PI * 2);
              ctx.fillStyle = star.color;
              ctx.shadowBlur = isPlaying ? 6 : 0;
              ctx.shadowColor = star.color;
              ctx.fill();
            });
            ctx.shadowBlur = 0;

            // Render interactive music visualizer bars
            if (revealStage >= 2) {
              const barWidth = width / numBars;
              for (let i = 0; i < numBars; i++) {
                const bar = visualizerBars[i];
                if (isPlaying) {
                  const wave = Math.sin((Date.now() * 0.005) + i * 0.35) * 35;
                  const randomBump = Math.cos((Date.now() * 0.008) - i * 0.15) * 15;
                  bar.targetHeight = Math.max(8, 55 + wave + randomBump);
                } else {
                  bar.targetHeight = 6;
                }
                bar.currentHeight += (bar.targetHeight - bar.currentHeight) * bar.speed;

                const x = i * barWidth;
                const y = height - bar.currentHeight;

                const barGrad = ctx.createLinearGradient(x, y, x, height);
                barGrad.addColorStop(0, 'rgba(34, 211, 238, 0.75)'); // Bright Cyan
                barGrad.addColorStop(0.6, 'rgba(139, 92, 246, 0.5)'); // Deep Violet
                barGrad.addColorStop(1, 'rgba(5, 4, 10, 0)');

                ctx.fillStyle = barGrad;
                ctx.fillRect(x, y, barWidth - 3, bar.currentHeight);
              }
            }
          } else {
            // Normal warm particles for the timeline view
            ctx.fillStyle = 'rgba(254, 252, 246, 1)'; // Solid light cream
            ctx.fillRect(0, 0, width, height);
            
            stars.slice(0, 35).forEach(star => {
              star.y -= star.speed * 0.25;
              if (star.y < 0) star.y = height;
              ctx.beginPath();
              ctx.arc(star.x, star.y, star.size * 1.3, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(236, 72, 153, 0.1)'; // Soft pink drops
              ctx.fill();
            });
          }

          animationFrameId = requestAnimationFrame(render);
        };

        render();

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', handleResize);
        };
      }, [revealStarted, isPlaying, revealStage]);

      // --- AUDIO CONTROL WITH YOUTUBE API ---
      // Rufus Du Sol - Innerbloom Video ID: 830vGZ_VjO8
      const loadYoutubeVideo = () => {
        if (ytPlayerRef.current) return;

        if (!window.YT) {
          const tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          const firstScriptTag = document.getElementsByTagName('script')[0];
          firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

          window.onYouTubeIframeAPIReady = () => {
            createPlayer();
          };
        } else {
          createPlayer();
        }
      };

      const createPlayer = () => {
        ytPlayerRef.current = new window.YT.Player('hidden-yt-player', {
          height: '0',
          width: '0',
          videoId: '830vGZ_VjO8',
          playerVars: {
            autoplay: 0,
            controls: 0,
            disablekb: 1,
            fs: 0,
            modestbranding: 1,
            rel: 0,
            showinfo: 0,
            start: 110 // Starts right inside the magical melodic drop
          },
          events: {
            onReady: (event) => {
              event.target.setVolume(85);
              if (revealStarted) {
                event.target.playVideo();
                setIsPlaying(true);
              }
            },
            onStateChange: (event) => {
              if (event.data === window.YT.PlayerState.PLAYING) {
                setIsPlaying(true);
              } else if (event.data === window.YT.PlayerState.PAUSED) {
                setIsPlaying(false);
              }
            }
          }
        });
      };

      const handleTogglePlay = () => {
        if (!ytPlayerRef.current) {
          loadYoutubeVideo();
          setIsPlaying(true);
          return;
        }
        if (isPlaying) {
          ytPlayerRef.current.pauseVideo();
          setIsPlaying(false);
        } else {
          ytPlayerRef.current.playVideo();
          setIsPlaying(true);
        }
      };

      const handleToggleMute = () => {
        if (!ytPlayerRef.current) return;
        if (isMuted) {
          ytPlayerRef.current.unMute();
          setIsMuted(false);
        } else {
          ytPlayerRef.current.mute();
          setIsMuted(true);
        }
      };

      // --- REVEAL ANIMATION TIMERS ---
      const triggerSurpriseReveal = () => {
        setRevealStarted(true);
        setRevealStage(0);
        setCurrentSlide(slides.length);
        
        loadYoutubeVideo();

        // 1. Initial fade-in pulse
        setTimeout(() => {
          setRevealStage(1);
        }, 1800);

        // 2. Music Visualizers kick in & playback plays
        setTimeout(() => {
          setRevealStage(2);
          if (ytPlayerRef.current && ytPlayerRef.current.playVideo) {
            ytPlayerRef.current.playVideo();
            setIsPlaying(true);
          }
        }, 5000);

        // 3. Final 3D Ticket drops onto screen
        setTimeout(() => {
          setRevealStage(3);
        }, 9500);
      };

      // --- BUILDER SYSTEM INTERFACES ---
      const handleAddSlide = () => {
        const newSlide = {
          id: `slide_${Date.now()}`,
          year: (birthYear + slides.length).toString(),
          title: 'A New Adventure',
          ageLabel: `Age ${slides.length}`,
          description: 'Type a beautiful memory about Bella during this year of her life.',
          image: 'https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=800&q=80'
        };
        setSlides([...slides, newSlide]);
        triggerToast('Added card! Click Edit to change the photo.');
      };

      const handleUpdateSlideField = (index, field, value) => {
        const updated = [...slides];
        updated[index][field] = value;
        setSlides(updated);
      };

      const handleDeleteSlide = (index) => {
        if (slides.length <= 1) {
          triggerToast('Keep at least one slide to tell her story!');
          return;
        }
        const updated = [...slides];
        updated.splice(index, 1);
        setSlides(updated);
        triggerToast('Slide removed.');
        if (currentSlide >= updated.length) {
          setCurrentSlide(updated.length - 1);
        }
      };

      const handleImageUpload = (index, e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            handleUpdateSlideField(index, 'image', reader.result);
            triggerToast(`Photo loaded for card ${slides[index].ageLabel}!`);
          };
          reader.readAsDataURL(file);
        }
      };

      const copyToClipboard = () => {
        const temp = document.createElement('input');
        temp.value = window.location.href;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        setCopiedLink(true);
        triggerToast('Webpage link copied to clipboard!');
        setTimeout(() => setCopiedLink(false), 3000);
      };

      // Realtime API generated QR code pointing back to this website
      const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(window.location.href)}`;

      return (
        <div className="min-h-screen relative overflow-hidden transition-all duration-1000 select-none">
          {/* Dynamic star field Canvas */}
          <canvas ref={canvasRef} className="absolute inset-0 w-full h-full pointer-events-none z-0" />
          
          <div id="hidden-yt-player" className="absolute -top-10 -left-10 w-1 h-1 opacity-0 pointer-events-none"></div>

          {/* --- TOP HEADER BAR --- */}
          <header className="relative z-10 max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className={`p-2 rounded-full ${revealStarted ? 'bg-purple-950 text-purple-300' : 'bg-rose-100 text-rose-500'}`}>
                <HeartIcon className={`w-5 h-5 ${revealStarted ? 'animate-pulse' : ''}`} />
              </div>
              <div>
                <h1 className={`text-sm md:text-base font-bold ${revealStarted ? 'text-purple-300' : 'text-slate-900'}`}>
                  {nieceName}'s Journey
                </h1>
                <p className={`text-[10px] opacity-60 ${revealStarted ? 'text-purple-400' : 'text-slate-500'}`}>Surprise Portal</p>
              </div>
            </div>

            {/* View Mode Switches */}
            <div className="flex bg-white/70 backdrop-blur-md p-1 rounded-full border border-slate-200/60 shadow-sm">
              <button
                onClick={() => {
                  setMode('preview');
                  setRevealStarted(false);
                  setRevealStage(0);
                  setCurrentSlide(0);
                  if (ytPlayerRef.current) ytPlayerRef.current.pauseVideo();
                }}
                className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold transition ${
                  mode === 'preview' && !revealStarted ? 'bg-rose-500 text-white shadow-sm' : 'text-slate-600 hover:text-slate-900'
                }`}
              >
                Niece View
              </button>
              <button
                onClick={() => {
                  setMode('edit');
                  setRevealStarted(false);
                  setRevealStage(0);
                  if (ytPlayerRef.current) ytPlayerRef.current.pauseVideo();
                }}
                className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold transition ${
                  mode === 'edit' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-600 hover:text-slate-900'
                }`}
              >
                Edit Card
              </button>
            </div>
          </header>

          {/* --- SYSTEM NOTIFICATIONS --- */}
          {showToast && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2.5 rounded-xl shadow-lg bg-slate-950 text-white border border-slate-800 text-xs font-medium animate-bounce">
              <SparklesIcon />
              <span>{showToast}</span>
            </div>
          )}

          {/* --- ADMIN CARD BUILDER MODE --- */}
          {mode === 'edit' && (
            <main className="relative z-10 max-w-5xl mx-auto px-4 py-4 grid grid-cols-1 lg:grid-cols-12 gap-6 pb-24">
              
              {/* Left Config Panel */}
              <div className="lg:col-span-5 space-y-5">
                <div className="bg-white/90 backdrop-blur-md p-5 rounded-2xl border border-slate-200/80 shadow-md space-y-4">
                  <h2 className="text-sm font-extrabold text-slate-950 flex items-center gap-2 border-b pb-2.5">
                    Bella's Setup
                  </h2>
                  <div className="grid grid-cols-2 gap-3 text-xs font-medium text-slate-500">
                    <div className="col-span-2">
                      <label className="block mb-1">Niece's Name</label>
                      <input
                        type="text"
                        value={nieceName}
                        onChange={(e) => setNieceName(e.target.value)}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                    <div className="col-span-2">
                      <label className="block mb-1">Birth Year</label>
                      <input
                        type="number"
                        value={birthYear}
                        onChange={(e) => setBirthYear(Number(e.target.value))}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                  </div>
                </div>

                <div className="bg-white/90 backdrop-blur-md p-5 rounded-2xl border border-slate-200/80 shadow-md space-y-4">
                  <h2 className="text-sm font-extrabold text-slate-950 flex items-center gap-2 border-b pb-2.5">
                    Surprise Ticket Details
                  </h2>
                  <div className="grid grid-cols-2 gap-3 text-xs font-medium text-slate-500">
                    <div className="col-span-2">
                      <label className="block mb-1">Artist / Headliner</label>
                      <input
                        type="text"
                        value={ticket.artist}
                        onChange={(e) => setTicket({...ticket, artist: e.target.value})}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                    <div className="col-span-2">
                      <label className="block mb-1">Concert Date</label>
                      <input
                        type="text"
                        value={ticket.date}
                        onChange={(e) => setTicket({...ticket, date: e.target.value})}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                    <div className="col-span-2">
                      <label className="block mb-1">Venue Venue Location</label>
                      <input
                        type="text"
                        value={ticket.venue}
                        onChange={(e) => setTicket({...ticket, venue: e.target.value})}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                    <div>
                      <label className="block mb-1">Section</label>
                      <input
                        type="text"
                        value={ticket.section}
                        onChange={(e) => setTicket({...ticket, section: e.target.value})}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                    <div>
                      <label className="block mb-1">Seat</label>
                      <input
                        type="text"
                        value={ticket.seat}
                        onChange={(e) => setTicket({...ticket, seat: e.target.value})}
                        className="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-slate-900"
                      />
                    </div>
                  </div>
                </div>

                <div className="bg-white/90 backdrop-blur-md p-5 rounded-2xl border border-slate-200/80 shadow-md space-y-4">
                  <h2 className="text-sm font-extrabold text-slate-950 border-b pb-2.5">
                    Generate Printable Card QR
                  </h2>
                  <div className="flex items-center gap-4">
                    <img src={qrCodeUrl} alt="Portal Link QR Code" className="w-24 h-24 border p-1 bg-white rounded-lg" />
                    <div className="space-y-2">
                      <p className="text-[10px] text-slate-500 leading-normal">
                        Save this QR code, print it out, and paste it into her physical birthday card! When she scans it, she will access this page.
                      </p>
                      <button
                        onClick={copyToClipboard}
                        className="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-xs font-semibold hover:bg-slate-800 transition block w-full text-center"
                      >
                        Copy Public Link
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              {/* Right Memory Slides list */}
              <div className="lg:col-span-7 space-y-4">
                <div className="flex justify-between items-center bg-white/70 backdrop-blur-md p-4 rounded-xl border border-slate-200/80">
                  <div>
                    <h3 className="text-xs font-bold text-slate-950">Bella's Slideshow Timeline</h3>
                    <p className="text-[10px] text-slate-500">Edit year cards and swap placeholders with your real photos</p>
                  </div>
                  <button
                    onClick={handleAddSlide}
                    className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition"
                  >
                    + Add New Card
                  </button>
                </div>

                <div className="space-y-4 max-h-[70vh] overflow-y-auto pr-1 no-scrollbar">
                  {slides.map((slide, idx) => (
                    <div key={slide.id} className="bg-white p-4 rounded-xl border border-slate-200/80 shadow-sm space-y-3 relative">
                      <button
                        onClick={() => handleDeleteSlide(idx)}
                        className="absolute top-4 right-4 text-slate-400 hover:text-rose-500 transition"
                      >
                        <Trash2Icon />
                      </button>

                      <div className="grid grid-cols-1 md:grid-cols-12 gap-3 text-xs">
                        <div className="md:col-span-3 space-y-2">
                          <div>
                            <label className="text-[9px] text-slate-400 font-bold uppercase">Year</label>
                            <input
                              type="text"
                              value={slide.year}
                              onChange={(e) => handleUpdateSlideField(idx, 'year', e.target.value)}
                              className="w-full border px-2 py-1 rounded bg-slate-50 font-bold"
                            />
                          </div>
                          <div>
                            <label className="text-[9px] text-slate-400 font-bold uppercase">Badge</label>
                            <input
                              type="text"
                              value={slide.ageLabel}
                              onChange={(e) => handleUpdateSlideField(idx, 'ageLabel', e.target.value)}
                              className="w-full border px-2 py-1 rounded bg-slate-50 font-bold"
                            />
                          </div>
                        </div>

                        <div className="md:col-span-9 space-y-2">
                          <div>
                            <label className="text-[9px] text-slate-400 font-bold uppercase">Slide Heading</label>
                            <input
                              type="text"
                              value={slide.title}
                              onChange={(e) => handleUpdateSlideField(idx, 'title', e.target.value)}
                              className="w-full border px-2 py-1 rounded bg-slate-50 font-medium"
                            />
                          </div>
                          <div>
                            <label className="text-[9px] text-slate-400 font-bold uppercase">Memory/Text</label>
                            <textarea
                              rows="2"
                              value={slide.description}
                              onChange={(e) => handleUpdateSlideField(idx, 'description', e.target.value)}
                              className="w-full border px-2 py-1 rounded bg-slate-50 leading-relaxed resize-none"
                            />
                          </div>
                        </div>
                      </div>

                      <div className="flex items-center gap-3 border-t pt-3">
                        <img src={slide.image} className="w-16 h-12 object-cover rounded-lg border bg-slate-100" />
                        <div className="flex-1">
                          <label className="cursor-pointer inline-flex items-center gap-1.5 px-3 py-1 bg-slate-100 text-slate-700 hover:bg-slate-200 rounded text-xs font-semibold transition">
                            Upload Real Photo
                            <input
                              type="file"
                              accept="image/*"
                              onChange={(e) => handleImageUpload(idx, e)}
                              className="hidden"
                            />
                          </label>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </main>
          )}

          {/* --- NIECE PREVIEW MODE --- */}
          {mode === 'preview' && !revealStarted && (
            <main className="relative z-10 max-w-4xl mx-auto px-4 py-8 md:py-12 flex flex-col min-h-[82vh] justify-between">
              
              <div className="space-y-6 flex-1 flex flex-col justify-center">
                <div className="text-center space-y-2">
                  <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-rose-100 text-rose-600 text-[10px] font-bold tracking-wider animate-pulse">
                    <SparklesIcon />
                    BIRTHDAY SURPRISE TIMELINE
                  </span>
                  <h1 className="text-3xl md:text-5xl font-black text-slate-900 tracking-tight leading-none">
                    Happy Birthday, <span className="text-transparent bg-clip-text bg-gradient-to-r from-rose-500 via-pink-500 to-amber-500">{nieceName}</span>!
                  </h1>
                  <p className="text-slate-500 text-xs md:text-sm max-w-md mx-auto leading-relaxed">
                    Let's celebrate the beautiful story of how you grew up throughout the years! Tap the next button to walk through your memories.
                  </p>
                </div>

                {/* Slideshow Display box */}
                <div className="bg-white/90 backdrop-blur-md rounded-3xl p-5 md:p-6 shadow-xl border border-slate-200/50 max-w-xl mx-auto w-full relative">
                  
                  {/* Slide header details */}
                  <div className="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                    <div className="flex items-center gap-1.5">
                      <span className="text-2xl font-black text-rose-500">{slides[currentSlide]?.year}</span>
                      <span className="px-2 py-0.5 rounded-full bg-rose-50 border border-rose-200 text-rose-600 text-[10px] font-bold">
                        {slides[currentSlide]?.ageLabel}
                      </span>
                    </div>

                    <div className="flex gap-1">
                      {slides.map((_, idx) => (
                        <div
                          key={idx}
                          className={`h-2 rounded-full transition-all duration-300 ${
                            idx === currentSlide ? 'w-5 bg-rose-500' : 'w-2 bg-slate-200'
                          }`}
                        />
                      ))}
                    </div>
                  </div>

                  {/* Main Media display area */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
                    <div className="aspect-[4/3] rounded-2xl overflow-hidden bg-slate-50 border relative group">
                      <img
                        src={slides[currentSlide]?.image}
                        alt={slides[currentSlide]?.title}
                        className="w-full h-full object-cover transition duration-300 group-hover:scale-105"
                      />
                    </div>
                    <div className="space-y-2">
                      <h3 className="text-base font-bold text-slate-900 leading-tight">
                        {slides[currentSlide]?.title}
                      </h3>
                      <p className="text-slate-600 text-xs leading-relaxed">
                        {slides[currentSlide]?.description}
                      </p>
                    </div>
                  </div>

                  {/* Slideshow Buttons */}
                  <div className="flex justify-between items-center mt-5 pt-3 border-t border-slate-100 text-xs">
                    <button
                      onClick={() => setCurrentSlide(p => Math.max(0, p - 1))}
                      disabled={currentSlide === 0}
                      className={`font-semibold py-1.5 px-3 rounded-lg transition ${
                        currentSlide === 0 ? 'text-slate-300 cursor-not-allowed' : 'hover:bg-slate-50'
                      }`}
                    >
                      ← Previous
                    </button>

                    {currentSlide < slides.length - 1 ? (
                      <button
                        onClick={() => setCurrentSlide(p => p + 1)}
                        className="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl transition"
                      >
                        Next Memory
                      </button>
                    ) : (
                      <button
                        onClick={triggerSurpriseReveal}
                        className="px-5 py-2.5 bg-gradient-to-r from-purple-600 via-rose-500 to-amber-500 text-white font-black rounded-xl hover:scale-105 transition shadow-lg animate-pulse"
                      >
                        🎁 Reveal Birthday Surprise!
                      </button>
                    )}
                  </div>
                </div>
              </div>

              <footer className="text-center mt-8 py-2">
                <p className="text-[10px] text-slate-400 font-medium">
                  Made with ❤️ for {nieceName} • Go through all slides to reveal the mystery!
                </p>
              </footer>
            </main>
          )}

          {/* --- CINEMATIC MUSIC REVEAL & TICKET --- */}
          {revealStarted && (
            <main className="relative z-10 max-w-3xl mx-auto px-4 py-12 flex flex-col justify-center items-center min-h-[85vh] text-center space-y-6">
              
              {/* Floating controller panel */}
              <div className="fixed top-24 right-4 md:right-8 z-50 bg-slate-950/80 backdrop-blur-md border border-slate-800 px-4 py-2.5 rounded-full flex items-center gap-3 shadow-2xl animate-fade-in text-xs text-white">
                <div className="flex items-center gap-2">
                  <span className="flex h-2 w-2 relative">
                    <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isPlaying ? 'bg-cyan-400' : 'bg-rose-500'}`}></span>
                    <span className={`relative inline-flex rounded-full h-2 w-2 ${isPlaying ? 'bg-cyan-500' : 'bg-rose-600'}`}></span>
                  </span>
                  <span className="text-[9px] font-bold tracking-wider">RÜFÜS DU SOL - INNERBLOOM</span>
                </div>
                
                <div className="flex items-center gap-1.5 border-l border-slate-800 pl-3">
                  <button onClick={handleTogglePlay} className="px-1.5 py-0.5 hover:bg-slate-950 rounded text-cyan-400 font-semibold">
                    {isPlaying ? 'PAUSE' : 'PLAY'}
                  </button>
                </div>
              </div>

              {/* STAGE 0/1 Atmosphere build up */}
              {revealStage < 2 && (
                <div className="space-y-4 max-w-md animate-pulse">
                  <span className="text-purple-400 font-extrabold tracking-widest text-xs uppercase block">
                    Wait for a moment...
                  </span>
                  <h2 className="text-2xl md:text-4xl font-bold font-serif-italic text-white">
                    "We've watched the years fly by..."
                  </h2>
                  <p className="text-slate-400 text-xs md:text-sm leading-relaxed font-light">
                    But the most exciting moments of all are still waiting to be created. Sound on...
                  </p>
                </div>
              )}

              {/* STAGE 2 Melodic build-up */}
              {revealStage === 2 && (
                <div className="space-y-3 max-w-md">
                  <span className="text-cyan-400 font-bold tracking-widest text-xs uppercase block animate-pulse">
                    Feel the build-up?
                  </span>
                  <h2 className="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-300 via-violet-300 to-pink-300 tracking-tight">
                    Surprise is Incoming
                  </h2>
                </div>
              )}

              {/* STAGE 3 Holographic concert ticket */}
              {revealStage >= 3 && (
                <div className="space-y-6 max-w-xl w-full">
                  <div className="space-y-1">
                    <span className="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full bg-cyan-950 border border-cyan-800 text-cyan-400 text-[10px] font-black tracking-wider animate-bounce">
                      SURPRISE SECURED
                    </span>
                    <h1 className="text-3xl md:text-5xl font-black text-white tracking-tight uppercase">
                      YOU'RE GOING!
                    </h1>
                    <p className="text-slate-400 text-xs max-w-xs mx-auto font-medium">
                      Happy birthday Bella! You are going to experience the incredible Rüfüs Du Sol live in performance!
                    </p>
                  </div>

                  {/* 3D Ticket card design */}
                  <div className="relative group mx-auto max-w-sm md:max-w-md transition-all duration-500 hover:scale-[1.02]">
                    <div className="absolute -inset-1 bg-gradient-to-r from-cyan-400 via-indigo-600 to-pink-500 rounded-3xl blur-md opacity-70 group-hover:opacity-100 transition duration-1000 animate-pulse"></div>
                    
                    <div className="relative bg-slate-950 text-slate-100 rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex flex-col md:flex-row items-stretch">
                      
                      {/* Left Concert Details Stub */}
                      <div className="flex-1 p-5 md:p-6 flex flex-col justify-between text-left space-y-4 relative border-b md:border-b-0 md:border-r border-slate-800 border-dashed">
                        
                        <div className="space-y-1">
                          <div className="flex justify-between items-center text-[9px]">
                            <span className="font-extrabold tracking-widest text-cyan-400 uppercase">BIRTHDAY GUEST PASS</span>
                            <span className="text-slate-500">ID: #RUF-BELLA-2026</span>
                          </div>
                          <h2 className="text-xl md:text-2xl font-black text-white leading-none">{ticket.artist}</h2>
                          <p className="text-[10px] font-bold text-purple-400">{ticket.tour}</p>
                        </div>

                        <div className="grid grid-cols-2 gap-3 border-t border-b border-slate-900 py-3 text-[10px]">
                          <div className="space-y-0.5">
                            <span className="text-[8px] text-slate-500 uppercase block">DATE</span>
                            <span className="font-bold flex items-center gap-1 text-slate-200"><CalendarIcon />{ticket.date}</span>
                          </div>
                          <div className="space-y-0.5">
                            <span className="text-[8px] text-slate-500 uppercase block">VENUE</span>
                            <span className="font-bold flex items-center gap-1 text-slate-200 truncate"><MapPinIcon />{ticket.venue}</span>
                          </div>
                        </div>

                        <div className="flex justify-between items-center bg-slate-900/60 p-2.5 rounded-xl text-[10px]">
                          <div>
                            <span className="text-[8px] text-slate-500 block">ATTENDEE</span>
                            <span className="font-black text-white">{nieceName}</span>
                          </div>
                          <div>
                            <span className="text-[8px] text-slate-500 block">SEAT</span>
                            <span className="font-bold text-pink-400">{ticket.seat}</span>
                          </div>
                        </div>
                      </div>

                      {/* Right Scan Ticket Stub */}
                      <div className="w-full md:w-32 bg-slate-900 p-4 flex flex-col justify-between items-center gap-3 relative text-xs">
                        <div className="space-y-0.5 text-center">
                          <span className="text-[8px] text-slate-500 uppercase block">ENTRY PASS</span>
                          <span className="font-extrabold text-white">VIP GRASS</span>
                        </div>
                        <img src={qrCodeUrl} className="w-16 h-16 border bg-white p-0.5 rounded-lg" />
                        <span className="text-[8px] text-slate-500">SCAN TO VERIFY</span>
                      </div>
                    </div>
                  </div>

                  {/* Return links */}
                  <div className="flex gap-3 justify-center text-xs">
                    <button
                      onClick={() => {
                        setRevealStarted(false);
                        setRevealStage(0);
                        setCurrentSlide(0);
                        if (ytPlayerRef.current) ytPlayerRef.current.pauseVideo();
                      }}
                      className="px-4 py-1.5 rounded-lg border border-slate-800 hover:border-slate-700 text-slate-400 hover:text-white transition"
                    >
                      ← Back to Slideshow
                    </button>
                    <button
                      onClick={() => triggerToast('Screenshot saved! Present this ticket at her birthday celebration 🎂')}
                      className="px-4 py-1.5 bg-gradient-to-r from-purple-600 to-rose-500 text-white rounded-lg font-bold hover:scale-105 transition shadow-md"
                    >
                      Save Ticket Screenshot
                    </button>
                  </div>
                </div>
              )}
            </main>
          )}
        </div>
      );
    }

    // Secondary UI SVG icons
    const Trash2Icon = () => (
      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
    );

    // Initial render call
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
